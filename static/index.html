<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LawAgent - 智能法律助手</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" id="hl-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>

<!-- Auth View -->
<div class="auth-view" id="authView">
  <div class="auth-container">
    <div class="auth-header">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <h1>LawAgent</h1>
      <p>智能法律助手</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登录</button>
      <button class="auth-tab" data-tab="register">注册</button>
    </div>
    <form class="auth-form" id="loginForm">
      <div class="auth-error" id="loginError" hidden></div>
      <input type="text" class="auth-input" id="loginUsername" placeholder="用户名" autocomplete="username" maxlength="50">
      <input type="password" class="auth-input" id="loginPassword" placeholder="密码" autocomplete="current-password" maxlength="64">
      <button type="submit" class="auth-btn" id="loginBtn">登录</button>
    </form>
    <form class="auth-form" id="registerForm" style="display:none">
      <div class="auth-error" id="registerError" hidden></div>
      <input type="text" class="auth-input" id="regUsername" placeholder="用户名（2-50 字符，字母数字下划线连字符）" autocomplete="username" maxlength="50">
      <input type="password" class="auth-input" id="regPassword" placeholder="密码（4-64 字符）" autocomplete="new-password" maxlength="64">
      <button type="submit" class="auth-btn" id="registerBtn">注册</button>
    </form>
    <p class="auth-hint">注册即表示您同意仅将本工具用于合法用途</p>
  </div>
</div>

<!-- App View -->
<div class="app-view" id="appView" style="display:none">

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="btn-new-chat" id="btnNewChat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>新对话</span>
    </button>
  </div>
  <nav class="session-list" id="sessionList"></nav>
  <div class="sidebar-footer">
    <div class="user-info" id="sidebarUser">
      <div class="avatar" id="sidebarAvatar">LA</div>
      <span id="sidebarUsername">LawAgent</span>
    </div>
    <button class="btn-logout" id="btnLogout" title="登出">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<main class="chat-main">
  <header class="chat-header">
    <button class="btn-menu" id="btnMenu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="chat-title" id="chatTitle">LawAgent</h1>
    <div class="header-actions">
      <button class="btn-icon" id="btnTheme" title="切换深色模式">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="iconTheme"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <div class="messages-container" id="messagesContainer">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7c7c9a" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <h2>LawAgent 智能法律助手</h2>
      <p class="welcome-sub">ReAct Agent · 法律咨询 · 案情分析 · 合同审查 · 文书撰写</p>
      <div class="quick-actions">
        <button class="quick-btn" data-prompt="借钱不还怎么处理？">借钱不还怎么处理？</button>
        <button class="quick-btn" data-prompt="劳动仲裁需要什么材料？">劳动仲裁需要什么材料？</button>
        <button class="quick-btn" data-prompt="帮我写一份借款合同">帮我写一份借款合同</button>
        <button class="quick-btn" data-prompt="分析一下合同违约的后果">分析一下合同违约的后果</button>
      </div>
    </div>
  </div>

  <div class="upload-bar" id="uploadBar" hidden>
    <svg class="upload-bar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <div class="upload-bar-info">
      <span class="upload-bar-name" id="uploadFileName"></span>
      <span class="upload-bar-size" id="uploadFileSize"></span>
    </div>
    <button class="btn-remove-doc" id="btnRemoveDoc" title="移除文档">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <footer class="input-area">
    <div class="input-wrapper">
      <button class="btn-upload" id="btnUpload" title="上传文档（限 1MB）">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/><line x1="16" y1="2" x2="22" y2="8"/><polyline points="17 13 12 13 12 19"/><polyline points="12 13 7 13"/></svg>
      </button>
      <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.png,.jpg,.jpeg,.md,.txt" hidden>
      <textarea id="messageInput" placeholder="输入法律问题，Enter 发送，Shift+Enter 换行" rows="1"></textarea>
      <button class="btn-send" id="btnSend" title="发送 (Enter)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">LawAgent 可能产生不准确信息，法律建议请咨询持证律师。</p>
  </footer>
</main>

<div class="toast" id="toast" hidden></div>

</div><!-- /app-view -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
